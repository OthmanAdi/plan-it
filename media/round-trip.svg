<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-label="plan-it round trip: task_plan.md, findings.md, and progress.md import upward into plan.html via scripts/init-plan.sh, and plan.html exports downward to chained agents, git diffs, and CI artifacts via scripts/export-markdown.py; the JSON-in-script-tag block inside plan.html is the source of truth">
  <defs>
    <style>
      .bg { fill: #fafaf7; }
      .fg { fill: #1b1b18; }
      .muted { fill: #5b5b56; }
      .accent { fill: #c8553d; }
      .code { fill: #f1f1ec; }
      .ok { fill: #2a6f4e; }
      .warn { fill: #b9802b; }
      .err { fill: #a73326; }
      .stroke-fg { stroke: #1b1b18; }
      .stroke-muted { stroke: #5b5b56; }
      .stroke-soft { stroke: #c8c8c2; }
      .stroke-accent { stroke: #c8553d; }
      .serif { font-family: 'ui-serif', Georgia, 'Times New Roman', serif; }
      .sans { font-family: system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'ui-monospace', 'SFMono-Regular', Menlo, monospace; }
      .fill-bg { fill: #fafaf7; }
      .fill-code { fill: #f1f1ec; }
      .fill-accent-soft { fill: #c8553d; fill-opacity: 0.08; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #161613; }
        .fg { fill: #ecece6; }
        .muted { fill: #9c9c95; }
        .accent { fill: #e07a5f; }
        .code { fill: #232320; }
        .ok { fill: #6ab089; }
        .warn { fill: #d9a25a; }
        .err { fill: #d96959; }
        .stroke-fg { stroke: #ecece6; }
        .stroke-muted { stroke: #9c9c95; }
        .stroke-soft { stroke: #3a3a36; }
        .stroke-accent { stroke: #e07a5f; }
        .fill-bg { fill: #161613; }
        .fill-code { fill: #232320; }
        .fill-accent-soft { fill: #e07a5f; fill-opacity: 0.12; }
      }
    </style>
    <marker id="arrow-fg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="fg"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="accent"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="520"/>

  <!-- header -->
  <text class="fg serif" x="64" y="42" font-size="22" font-weight="700">Round-trip</text>
  <text class="muted mono" x="64" y="62" font-size="11">markdown stack &lt;-&gt; plan.html &lt;-&gt; downstream consumers</text>
  <line x1="64" y1="76" x2="1216" y2="76" class="stroke-soft" stroke-width="1"/>

  <!-- ====== CENTER: plan.html (top-center, the canonical state) ====== -->
  <!-- container -->
  <g transform="translate(420, 100)">
    <rect class="fill-bg stroke-fg" width="440" height="232" stroke-width="2"/>

    <!-- title bar -->
    <text class="fg serif" x="16" y="26" font-size="14" font-weight="700">plan.html</text>
    <text class="muted mono" x="334" y="26" font-size="10">single offline file</text>
    <line x1="0" y1="40" x2="440" y2="40" class="stroke-fg" stroke-width="1"/>

    <!-- file shape: style + script[json] (HIGHLIGHTED) + script[js] -->
    <g transform="translate(16, 52)">
      <!-- style block -->
      <rect class="fill-code stroke-soft" width="408" height="34" stroke-width="1"/>
      <text class="mono muted" x="12" y="14" font-size="10">&lt;style&gt;</text>
      <text class="mono muted" x="12" y="28" font-size="10">  /* render layer (derived) */</text>

      <!-- JSON-in-script-tag block (the canonical state — accent emphasis) -->
      <g transform="translate(0, 42)">
        <rect class="fill-accent-soft stroke-accent" width="408" height="76" stroke-width="2"/>
        <text class="mono accent" x="12" y="14" font-size="10" font-weight="700">&lt;script type="application/json" id="plan-data"&gt;</text>
        <text class="mono fg" x="12" y="32" font-size="10">  { "phases": [...],</text>
        <text class="mono fg" x="12" y="46" font-size="10">    "findings": [...],</text>
        <text class="mono fg" x="12" y="60" font-size="10">    "progress": [...] }</text>
        <text class="mono accent" x="12" y="74" font-size="10" font-weight="700">&lt;/script&gt;</text>
      </g>

      <!-- behavior script -->
      <g transform="translate(0, 126)">
        <rect class="fill-code stroke-soft" width="408" height="34" stroke-width="1"/>
        <text class="mono muted" x="12" y="14" font-size="10">&lt;script&gt;</text>
        <text class="mono muted" x="12" y="28" font-size="10">  /* behavior layer (vanilla JS) */</text>
      </g>
    </g>

    <!-- callout for the highlighted block -->
    <text class="accent sans" x="220" y="222" font-size="11" font-weight="700" text-anchor="middle">source of truth</text>
  </g>

  <!-- ====== LEFT: markdown stack ====== -->
  <g transform="translate(80, 232)">
    <text class="muted mono" x="0" y="-8" font-size="10">markdown trio</text>
    <!-- three stacked files -->
    <g>
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg mono" x="16" y="22" font-size="12" font-weight="600">task_plan.md</text>
      <text class="muted sans" x="120" y="22" font-size="10">phases</text>
    </g>
    <g transform="translate(0, 44)">
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg mono" x="16" y="22" font-size="12" font-weight="600">findings.md</text>
      <text class="muted sans" x="120" y="22" font-size="10">research</text>
    </g>
    <g transform="translate(0, 88)">
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg mono" x="16" y="22" font-size="12" font-weight="600">progress.md</text>
      <text class="muted sans" x="120" y="22" font-size="10">log</text>
    </g>
  </g>

  <!-- LEFT arrow: up-and-right from markdown stack -> plan.html (importing) -->
  <!-- starts near top of stack (x ~300, y ~240) ends at plan.html left edge (x=420, y=200) -->
  <path d="M 304 244 C 360 244, 380 220, 416 208" fill="none" class="stroke-accent" stroke-width="1.75" marker-end="url(#arrow-accent)"/>
  <!-- label box -->
  <g transform="translate(308, 196)">
    <rect class="fill-bg stroke-soft" width="116" height="32" stroke-width="1"/>
    <text class="accent mono" x="58" y="14" font-size="10" font-weight="700" text-anchor="middle">init-plan.sh</text>
    <text class="muted sans" x="58" y="26" font-size="9" text-anchor="middle">importing</text>
  </g>

  <!-- ====== RIGHT: downstream consumers ====== -->
  <g transform="translate(980, 232)">
    <text class="muted mono" x="0" y="-8" font-size="10">downstream consumers</text>
    <g>
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg sans" x="16" y="22" font-size="12" font-weight="600">chained agents</text>
      <text class="muted mono" x="148" y="22" font-size="10">md in</text>
    </g>
    <g transform="translate(0, 44)">
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg sans" x="16" y="22" font-size="12" font-weight="600">git diffs</text>
      <text class="muted mono" x="148" y="22" font-size="10">clean</text>
    </g>
    <g transform="translate(0, 88)">
      <rect class="fill-bg stroke-fg" width="220" height="38" stroke-width="1.5"/>
      <text class="fg sans" x="16" y="22" font-size="12" font-weight="600">CI artifacts</text>
      <text class="muted mono" x="148" y="22" font-size="10">checked</text>
    </g>
  </g>

  <!-- RIGHT arrow: down-and-right from plan.html -> consumers (exporting) -->
  <!-- starts at plan.html right edge (x=860, y=208) ends near top of consumers stack (x=976, y=244) -->
  <path d="M 864 208 C 906 220, 924 244, 976 244" fill="none" class="stroke-accent" stroke-width="1.75" marker-end="url(#arrow-accent)"/>
  <!-- label box -->
  <g transform="translate(856, 196)">
    <rect class="fill-bg stroke-soft" width="140" height="32" stroke-width="1"/>
    <text class="accent mono" x="70" y="14" font-size="10" font-weight="700" text-anchor="middle">export-markdown.py</text>
    <text class="muted sans" x="70" y="26" font-size="9" text-anchor="middle">exporting</text>
  </g>

  <!-- footer band -->
  <line x1="64" y1="470" x2="1216" y2="470" class="stroke-soft" stroke-width="1"/>
  <text class="fg sans" x="640" y="492" font-size="13" font-weight="600" text-anchor="middle">JSON is the source of truth.  The render layer is derived.  Diffs stay clean.</text>
  <text class="muted mono" x="640" y="508" font-size="10" text-anchor="middle">edit either side  /  the &lt;script type="application/json"&gt; block is the contract</text>
</svg>
