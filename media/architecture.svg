<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="plan-it architecture: user prompt flows through Claude Code, SKILL.md hooks (UserPromptSubmit, PreToolUse, PostToolUse, Stop, PreCompact), plan-hook.py, a SHA-256 attestation check against plan.html, and a delimited plan-data block injected back into Claude Code context, distributed across 17 IDE platforms">
  <defs>
    <style>
      .bg { fill: #fafaf7; }
      .fg { fill: #1b1b18; }
      .muted { fill: #5b5b56; }
      .accent { fill: #c8553d; }
      .code { fill: #f1f1ec; }
      .ok { fill: #2a6f4e; }
      .warn { fill: #b9802b; }
      .err { fill: #a73326; }
      .stroke-fg { stroke: #1b1b18; }
      .stroke-muted { stroke: #5b5b56; }
      .stroke-soft { stroke: #c8c8c2; }
      .stroke-accent { stroke: #c8553d; }
      .stroke-ok { stroke: #2a6f4e; }
      .serif { font-family: 'ui-serif', Georgia, 'Times New Roman', serif; }
      .sans { font-family: system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'ui-monospace', 'SFMono-Regular', Menlo, monospace; }
      .fill-bg { fill: #fafaf7; }
      .fill-code { fill: #f1f1ec; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #161613; }
        .fg { fill: #ecece6; }
        .muted { fill: #9c9c95; }
        .accent { fill: #e07a5f; }
        .code { fill: #232320; }
        .ok { fill: #6ab089; }
        .warn { fill: #d9a25a; }
        .err { fill: #d96959; }
        .stroke-fg { stroke: #ecece6; }
        .stroke-muted { stroke: #9c9c95; }
        .stroke-soft { stroke: #3a3a36; }
        .stroke-accent { stroke: #e07a5f; }
        .stroke-ok { stroke: #6ab089; }
        .fill-bg { fill: #161613; }
        .fill-code { fill: #232320; }
      }
    </style>
    <marker id="arrow-fg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="fg"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="accent"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="560"/>

  <!-- header -->
  <text class="fg serif" x="64" y="42" font-size="22" font-weight="700">Architecture</text>
  <text class="muted mono" x="64" y="62" font-size="11">prompt &gt; hooks &gt; helper &gt; attested plan &gt; context</text>
  <line x1="64" y1="76" x2="1216" y2="76" class="stroke-soft" stroke-width="1"/>

  <!-- main column: x=460, w=360, center x=640 -->

  <!-- box 1: user prompt -->
  <g transform="translate(460, 96)">
    <rect class="fill-bg stroke-fg" width="360" height="44" stroke-width="1.5"/>
    <text class="fg sans" x="180" y="20" font-size="13" font-weight="600" text-anchor="middle">User prompt</text>
    <text class="muted mono" x="180" y="36" font-size="10" text-anchor="middle">turn 0</text>
  </g>
  <line x1="640" y1="140" x2="640" y2="162" class="stroke-fg" stroke-width="1.5" marker-end="url(#arrow-fg)"/>

  <!-- box 2: Claude Code -->
  <g transform="translate(460, 164)">
    <rect class="fill-bg stroke-fg" width="360" height="44" stroke-width="1.5"/>
    <text class="fg sans" x="180" y="20" font-size="13" font-weight="600" text-anchor="middle">Claude Code</text>
    <text class="muted mono" x="180" y="36" font-size="10" text-anchor="middle">agent runtime</text>
  </g>
  <line x1="640" y1="208" x2="640" y2="230" class="stroke-fg" stroke-width="1.5" marker-end="url(#arrow-fg)"/>

  <!-- box 3: SKILL.md hooks -->
  <g transform="translate(420, 232)">
    <rect class="fill-bg stroke-fg" width="440" height="68" stroke-width="1.5"/>
    <text class="fg sans" x="220" y="20" font-size="13" font-weight="600" text-anchor="middle">SKILL.md hooks</text>
    <text class="muted mono" x="220" y="40" font-size="10" text-anchor="middle">UserPromptSubmit  /  PreToolUse  /  PostToolUse</text>
    <text class="muted mono" x="220" y="56" font-size="10" text-anchor="middle">Stop  /  PreCompact</text>
  </g>
  <line x1="640" y1="300" x2="640" y2="322" class="stroke-fg" stroke-width="1.5" marker-end="url(#arrow-fg)"/>

  <!-- box 4: plan-hook.py helper -->
  <g transform="translate(460, 324)">
    <rect class="fill-bg stroke-fg" width="360" height="44" stroke-width="1.5"/>
    <text class="fg sans" x="180" y="20" font-size="13" font-weight="600" text-anchor="middle">plan-hook.py helper</text>
    <text class="muted mono" x="180" y="36" font-size="10" text-anchor="middle">scripts/plan-hook.py</text>
  </g>

  <!-- horizontal accent branch to the attestation cluster, two-way -->
  <line x1="820" y1="346" x2="906" y2="346" class="stroke-accent" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <line x1="906" y1="358" x2="820" y2="358" class="stroke-accent" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-accent)"/>
  <text class="muted mono" x="828" y="342" font-size="9">verify</text>
  <text class="muted mono" x="828" y="372" font-size="9">read plan</text>

  <!-- attestation cluster on the right -->
  <g transform="translate(908, 308)">
    <rect class="fill-code stroke-fg" width="232" height="78" stroke-width="1.5"/>
    <text class="fg sans" x="116" y="20" font-size="12" font-weight="600" text-anchor="middle">SHA-256 attestation</text>
    <line x1="12" y1="30" x2="220" y2="30" class="stroke-soft" stroke-width="1"/>
    <text class="mono fg" x="14" y="48" font-size="10">plan.html</text>
    <text class="mono muted" x="118" y="48" font-size="10">embedded JSON</text>
    <text class="mono fg" x="14" y="66" font-size="10">.plan-attestation</text>
    <text class="mono ok" x="162" y="66" font-size="10" font-weight="700">verified</text>
  </g>

  <!-- arrow helper -> delimiter block -->
  <line x1="640" y1="368" x2="640" y2="394" class="stroke-fg" stroke-width="1.5" marker-end="url(#arrow-fg)"/>

  <!-- box 5: delimiter block -->
  <g transform="translate(420, 396)">
    <rect class="fill-code stroke-fg" width="440" height="60" stroke-width="1.5"/>
    <text class="mono accent" x="220" y="22" font-size="11" font-weight="700" text-anchor="middle">===BEGIN PLAN DATA===</text>
    <text class="mono muted" x="220" y="38" font-size="10" text-anchor="middle">active phase summary</text>
    <text class="mono accent" x="220" y="53" font-size="11" font-weight="700" text-anchor="middle">===END PLAN DATA===</text>
  </g>
  <line x1="640" y1="456" x2="640" y2="478" class="stroke-fg" stroke-width="1.5" marker-end="url(#arrow-fg)"/>

  <!-- final outcome line -->
  <g transform="translate(420, 480)">
    <rect class="fill-bg stroke-accent" width="440" height="34" stroke-width="1.5"/>
    <text class="fg sans" x="220" y="22" font-size="12" font-weight="600" text-anchor="middle">Claude Code context  &gt;  agent stays in the loop</text>
  </g>

  <!-- LEFT annotation column -->
  <g transform="translate(80, 232)">
    <text class="muted mono" x="0" y="0" font-size="10">files on disk</text>
    <line x1="0" y1="6" x2="280" y2="6" class="stroke-soft" stroke-width="1"/>
    <text class="fg mono" x="0" y="22" font-size="11">skills/plan-it/SKILL.md</text>
    <text class="fg mono" x="0" y="40" font-size="11">scripts/plan-hook.py</text>
    <text class="fg mono" x="0" y="58" font-size="11">.plan-attestation</text>
    <text class="fg mono" x="0" y="76" font-size="11">plan.html</text>
    <text class="muted mono" x="0" y="100" font-size="11">task_plan.md</text>
    <text class="muted mono" x="0" y="116" font-size="11">findings.md</text>
    <text class="muted mono" x="0" y="132" font-size="11">progress.md</text>
  </g>

  <!-- RIGHT annotation column (trigger surface) -->
  <g transform="translate(908, 96)">
    <text class="muted mono" x="0" y="0" font-size="10">trigger surface</text>
    <line x1="0" y1="6" x2="232" y2="6" class="stroke-soft" stroke-width="1"/>
    <text class="fg sans" x="0" y="24" font-size="11" font-weight="600">UserPromptSubmit</text>
    <text class="muted sans" x="0" y="40" font-size="10">fires every turn</text>
    <text class="fg sans" x="0" y="62" font-size="11" font-weight="600">Stop / PreCompact</text>
    <text class="muted sans" x="0" y="78" font-size="10">survives /clear</text>
    <text class="fg sans" x="0" y="100" font-size="11" font-weight="600">PreToolUse / PostToolUse</text>
    <text class="muted sans" x="0" y="116" font-size="10">phase tracking</text>
  </g>

  <!-- 17-IDE footer band -->
  <line x1="64" y1="528" x2="1216" y2="528" class="stroke-soft" stroke-width="1"/>
  <text class="muted mono" x="64" y="546" font-size="10">17 IDEs</text>
  <text class="fg mono" x="120" y="546" font-size="10">Claude Code  Cursor  Codex  GitHub Copilot  Mastra Code  OpenCode  Hermes  CodeBuddy  Factory Droid  Gemini CLI  Kiro</text>
  <text class="muted mono" x="120" y="558" font-size="10">Continue  Pi Agent  OpenClaw  Antigravity  Kilocode  AdaL CLI</text>
</svg>
