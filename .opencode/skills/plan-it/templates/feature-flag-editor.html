<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feature Flag Editor</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafaf7;
    --fg: #1b1b18;
    --muted: #5b5b56;
    --accent: #c8553d;
    --border: #1b1b18;
    --border-soft: #c8c8c2;
    --code: #f1f1ec;
    --ok: #2a6f4e;
    --warn: #b9802b;
    --err: #a73326;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161613;
      --fg: #ecece6;
      --muted: #9c9c95;
      --accent: #e07a5f;
      --border: #ecece6;
      --border-soft: #3a3a36;
      --code: #232320;
      --ok: #6ab089;
      --warn: #d9a25a;
      --err: #d96959;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.5;
  }
  header.bar {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  header.bar h1 {
    margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
  }
  header.bar .meta {
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 12px; color: var(--muted);
  }
  header.bar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font: inherit; font-size: 12px; padding: 6px 10px;
    background: transparent; color: var(--fg);
    border: 1px solid var(--border); border-radius: 2px;
    cursor: pointer;
  }
  button:hover { background: var(--fg); color: var(--bg); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  nav.tabs {
    display: flex; gap: 0; padding: 0 24px;
    border-bottom: 1px solid var(--border-soft);
    flex-wrap: wrap;
  }
  nav.tabs button {
    border: none; border-bottom: 2px solid transparent;
    border-radius: 0; padding: 12px 16px;
    color: var(--muted); background: transparent;
  }
  nav.tabs button[aria-selected="true"] {
    color: var(--fg); border-bottom-color: var(--accent);
  }
  nav.tabs button:hover { color: var(--fg); background: transparent; }
  main { padding: 24px; max-width: 1280px; margin: 0 auto; }
  section[role="tabpanel"][hidden] { display: none; }
  h2 {
    font-family: ui-serif, Georgia, serif;
    font-size: 18px; font-weight: 700; margin: 0 0 12px;
  }

  .cycle-banner {
    border: 1px solid var(--err);
    background: var(--bg);
    color: var(--err);
    padding: 12px 14px;
    margin-bottom: 16px;
    border-radius: 2px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
  }
  .cycle-banner strong { font-family: ui-serif, Georgia, serif; }

  .group {
    border: 1px solid var(--border-soft); border-radius: 2px;
    margin-bottom: 16px;
    background: var(--bg);
  }
  .group-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .group-head h3 {
    margin: 0; font-size: 14px; font-weight: 700;
    font-family: ui-serif, Georgia, serif;
  }
  .group-id {
    font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted);
  }
  .group-body { padding: 4px 0; }

  .flag {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 16px;
    padding: 12px 14px;
    border-top: 1px solid var(--border-soft);
  }
  .flag:first-child { border-top: none; }
  @media (max-width: 760px) {
    .flag { grid-template-columns: 1fr; }
  }

  .flag-main { min-width: 0; }
  .flag-key-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .flag-key {
    font-family: ui-monospace, monospace; font-size: 13px; font-weight: 700;
  }
  .flag-changed {
    font-family: ui-monospace, monospace; font-size: 10px;
    color: var(--accent);
    padding: 1px 5px;
    border: 1px solid var(--accent); border-radius: 2px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .flag-desc {
    font-size: 13px; color: var(--muted); margin: 4px 0 6px;
  }
  .flag-relations {
    font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted);
    display: flex; flex-direction: column; gap: 2px;
  }
  .flag-warn {
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--err); font-weight: 600;
    margin-top: 4px;
  }
  .flag-warn::before { content: "! "; }

  .flag-controls {
    display: flex; flex-direction: column; gap: 6px;
    align-items: stretch;
  }
  .control-row {
    display: flex; align-items: center; gap: 8px;
  }
  .toggle {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer;
    font-family: ui-monospace, monospace; font-size: 12px;
  }
  .toggle input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent);
  }
  .toggle input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  select.enum {
    font: inherit; font-size: 13px; padding: 4px 8px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border-soft); border-radius: 2px;
    font-family: ui-monospace, monospace;
    width: 100%;
  }
  select.enum:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .rollout-row {
    display: grid;
    grid-template-columns: 1fr 48px;
    gap: 8px;
    align-items: center;
  }
  .rollout-row label {
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    grid-column: 1 / -1;
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  input[type="range"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  output.rollout-out {
    font-family: ui-monospace, monospace; font-size: 12px;
    text-align: right;
    color: var(--fg);
  }
  .rollout-out[data-changed="true"] { color: var(--accent); font-weight: 700; }

  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    border: 1px solid var(--border-soft);
  }
  th, td {
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border-soft);
    font-family: ui-monospace, monospace;
  }
  th { background: var(--code); font-weight: 600; }

  footer.bar {
    border-top: 1px solid var(--border); padding: 12px 24px;
    font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .skip-link {
    position: absolute; left: -9999px; top: 8px;
    padding: 8px 12px; background: var(--accent); color: var(--bg);
  }
  .skip-link:focus { left: 16px; }
  .empty { font-style: italic; color: var(--muted); padding: 24px; text-align: center; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>

<header class="bar" role="banner">
  <div>
    <h1 id="plan-title">Feature Flag Editor</h1>
    <div class="meta" id="plan-meta">template: feature-flag-editor</div>
  </div>
  <div class="actions" role="group" aria-label="Editor actions">
    <button type="button" id="btn-save" aria-label="Save plan.html to disk">Save</button>
    <button type="button" id="btn-copy-diff" aria-label="Copy changed flags as diff">Copy diff</button>
    <button type="button" id="btn-copy-json" aria-label="Copy full plan-data as JSON">Copy as JSON</button>
    <button type="button" id="btn-reset" aria-label="Reset all flags to loaded snapshot">Reset</button>
    <button type="button" id="btn-print" aria-label="Print editor">Print</button>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Editor sections">
  <button role="tab" type="button" aria-controls="tab-flags"     aria-selected="true"  id="tab-flags-btn">Flags</button>
  <button role="tab" type="button" aria-controls="tab-findings"  aria-selected="false" id="tab-findings-btn">Findings</button>
  <button role="tab" type="button" aria-controls="tab-decisions" aria-selected="false" id="tab-decisions-btn">Decisions</button>
  <button role="tab" type="button" aria-controls="tab-progress"  aria-selected="false" id="tab-progress-btn">Progress</button>
</nav>

<main id="main">
  <section role="tabpanel" id="tab-flags" aria-labelledby="tab-flags-btn">
    <h2>Flags</h2>
    <div id="cycle-banner-root" aria-live="polite"></div>
    <div id="groups-root"></div>
  </section>

  <section role="tabpanel" id="tab-findings" aria-labelledby="tab-findings-btn" hidden>
    <h2>Findings</h2>
    <table>
      <thead><tr><th>Source</th><th>Note</th></tr></thead>
      <tbody id="findings-root"></tbody>
    </table>
  </section>

  <section role="tabpanel" id="tab-decisions" aria-labelledby="tab-decisions-btn" hidden>
    <h2>Decisions</h2>
    <table>
      <thead><tr><th>Decision</th><th>Rationale</th></tr></thead>
      <tbody id="decisions-root"></tbody>
    </table>
  </section>

  <section role="tabpanel" id="tab-progress" aria-labelledby="tab-progress-btn" hidden>
    <h2>Progress log</h2>
    <table>
      <thead><tr><th>Timestamp</th><th>Phase</th><th>Action</th><th>Files</th></tr></thead>
      <tbody id="progress-root"></tbody>
    </table>
  </section>
</main>

<footer class="bar" role="contentinfo">
  <div>plan-it v0.1.0 — single-file persistent HTML plan</div>
  <div id="footer-sha">Plan-SHA256: (run /plan-attest to lock)</div>
</footer>

<script>
(() => {
  "use strict";

  const dataEl = document.getElementById("plan-data");
  let plan = {};
  try { plan = JSON.parse(dataEl.textContent); }
  catch (e) {
    document.getElementById("groups-root").innerHTML =
      '<p class="empty">plan-data JSON could not be parsed.</p>';
    return;
  }

  // Header
  document.getElementById("plan-title").textContent = plan.plan_title || "Feature Flag Editor";
  const groups = Array.isArray(plan.groups) ? plan.groups : [];
  const flagCount = groups.reduce((n, g) => n + (g.flags || []).length, 0);
  document.getElementById("plan-meta").textContent =
    `template: ${plan.template || "(custom)"} · ${flagCount} flags across ${groups.length} groups`;
  if (plan.attestation_sha256) {
    document.getElementById("footer-sha").textContent = "Plan-SHA256: " + plan.attestation_sha256;
  }

  // Snapshot for diff/reset
  const snapshot = JSON.parse(JSON.stringify(groups));

  // Flag index
  function eachFlag(cb) {
    groups.forEach(g => (g.flags || []).forEach(f => cb(f, g)));
  }
  function findFlag(key) {
    for (const g of groups) for (const f of (g.flags || [])) if (f.key === key) return f;
    return null;
  }
  function snapFlag(key) {
    for (const g of snapshot) for (const f of (g.flags || [])) if (f.key === key) return f;
    return null;
  }

  // Cycle detection: DFS over the requires graph. Treats requires as a directed
  // edge A -> R (A requires R). A cycle is any path that returns to itself.
  function detectCycles() {
    const adj = {};
    eachFlag(f => { adj[f.key] = (f.requires || []).slice(); });
    const cycles = [];
    const WHITE = 0, GRAY = 1, BLACK = 2;
    const color = {};
    Object.keys(adj).forEach(k => color[k] = WHITE);
    const stack = [];

    function dfs(node) {
      color[node] = GRAY;
      stack.push(node);
      for (const next of (adj[node] || [])) {
        if (!(next in color)) continue; // dangling requires — surfaced separately
        if (color[next] === GRAY) {
          const i = stack.indexOf(next);
          if (i !== -1) cycles.push(stack.slice(i).concat([next]));
        } else if (color[next] === WHITE) {
          dfs(next);
        }
      }
      stack.pop();
      color[node] = BLACK;
    }

    Object.keys(adj).forEach(k => { if (color[k] === WHITE) dfs(k); });

    // dedupe cycles (normalize starting node to smallest key)
    const seen = new Set();
    const unique = [];
    cycles.forEach(c => {
      const ring = c.slice(0, -1);
      const minIdx = ring.indexOf(ring.slice().sort()[0]);
      const rot = ring.slice(minIdx).concat(ring.slice(0, minIdx));
      const key = rot.join(">");
      if (!seen.has(key)) { seen.add(key); unique.push(rot.concat([rot[0]])); }
    });
    return unique;
  }

  const cycleRoot = document.getElementById("cycle-banner-root");
  function renderCycles() {
    cycleRoot.innerHTML = "";
    const cycles = detectCycles();
    if (cycles.length === 0) return;
    const div = document.createElement("div");
    div.className = "cycle-banner";
    div.setAttribute("role", "alert");
    const strong = document.createElement("strong");
    strong.textContent = "Dependency cycle detected. ";
    div.appendChild(strong);
    const txt = document.createElement("span");
    txt.textContent = cycles.map(c => c.join(" → ")).join(" · ");
    div.appendChild(txt);
    cycleRoot.appendChild(div);
  }

  // Truthy "enabled" for any flag: bool is its value; enum is "on" iff value != off/none/disabled
  function isEnabled(f) {
    if (!f) return false;
    if (f.type === "bool") return !!f.value;
    const v = String(f.value || "").toLowerCase();
    return v !== "" && v !== "off" && v !== "none" && v !== "disabled" && v !== "false";
  }

  function flagChanged(f) {
    const s = snapFlag(f.key); if (!s) return false;
    return f.value !== s.value || (f.rolled_out ?? 100) !== (s.rolled_out ?? 100);
  }

  const groupsRoot = document.getElementById("groups-root");

  function renderGroups() {
    groupsRoot.innerHTML = "";
    groups.forEach(g => {
      const section = document.createElement("section");
      section.className = "group";
      section.setAttribute("aria-labelledby", `group-${g.id}-h`);

      const head = document.createElement("div");
      head.className = "group-head";
      const h3 = document.createElement("h3");
      h3.id = `group-${g.id}-h`;
      h3.textContent = g.name || g.id;
      const gid = document.createElement("span");
      gid.className = "group-id";
      gid.textContent = `${(g.flags || []).length} flags`;
      head.appendChild(h3); head.appendChild(gid);
      section.appendChild(head);

      const body = document.createElement("div");
      body.className = "group-body";
      (g.flags || []).forEach(f => body.appendChild(renderFlag(f)));
      section.appendChild(body);
      groupsRoot.appendChild(section);
    });
  }

  function renderFlag(f) {
    const row = document.createElement("div");
    row.className = "flag";

    // ---- Left column: identity + description + relations + warnings
    const main = document.createElement("div");
    main.className = "flag-main";

    const keyRow = document.createElement("div");
    keyRow.className = "flag-key-row";
    const key = document.createElement("span");
    key.className = "flag-key"; key.textContent = f.key;
    keyRow.appendChild(key);
    const changedTag = document.createElement("span");
    changedTag.className = "flag-changed";
    changedTag.textContent = "changed";
    changedTag.hidden = !flagChanged(f);
    keyRow.appendChild(changedTag);
    main.appendChild(keyRow);

    if (f.description) {
      const desc = document.createElement("p");
      desc.className = "flag-desc"; desc.textContent = f.description;
      main.appendChild(desc);
    }

    const rel = document.createElement("div");
    rel.className = "flag-relations";
    if ((f.requires || []).length) {
      const r = document.createElement("span");
      r.textContent = "→ requires " + f.requires.join(", ");
      rel.appendChild(r);
    }
    if ((f.conflicts || []).length) {
      const c = document.createElement("span");
      c.textContent = "✕ conflicts with " + f.conflicts.join(", ");
      rel.appendChild(c);
    }
    if (rel.children.length) main.appendChild(rel);

    const warn = document.createElement("div");
    warn.className = "flag-warn";
    warn.hidden = true;
    warn.id = `warn-${f.key}`;
    main.appendChild(warn);

    row.appendChild(main);

    // ---- Right column: controls
    const controls = document.createElement("div");
    controls.className = "flag-controls";

    if (f.type === "enum") {
      const sel = document.createElement("select");
      sel.className = "enum";
      sel.setAttribute("aria-label", `Value for ${f.key}`);
      (f.options || []).forEach(opt => {
        const o = document.createElement("option");
        o.value = opt; o.textContent = opt;
        if (f.value === opt) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => {
        f.value = sel.value;
        touch();
        changedTag.hidden = !flagChanged(f);
        recomputeWarnings();
      });
      controls.appendChild(sel);
    } else {
      // bool: render as switch
      const label = document.createElement("label");
      label.className = "toggle";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.role = "switch";
      cb.checked = !!f.value;
      cb.setAttribute("aria-label", `Enable ${f.key}`);
      const lt = document.createElement("span");
      lt.textContent = cb.checked ? "enabled" : "disabled";
      cb.addEventListener("change", () => {
        f.value = cb.checked;
        lt.textContent = cb.checked ? "enabled" : "disabled";
        touch();
        changedTag.hidden = !flagChanged(f);
        recomputeWarnings();
      });
      label.appendChild(cb); label.appendChild(lt);
      controls.appendChild(label);
    }

    // Rollout slider
    const rolloutWrap = document.createElement("div");
    rolloutWrap.className = "rollout-row";
    const rolloutLab = document.createElement("label");
    rolloutLab.setAttribute("for", `rollout-${f.key}`);
    rolloutLab.textContent = "Rollout %";
    const range = document.createElement("input");
    range.type = "range"; range.min = "0"; range.max = "100"; range.step = "1";
    range.id = `rollout-${f.key}`;
    range.value = String(f.rolled_out ?? 100);
    range.setAttribute("aria-label", `Rollout percentage for ${f.key}`);
    const out = document.createElement("output");
    out.className = "rollout-out";
    out.setAttribute("for", range.id);
    out.textContent = range.value + "%";
    range.addEventListener("input", () => {
      out.textContent = range.value + "%";
      f.rolled_out = Number(range.value);
      out.setAttribute("data-changed", String(flagChanged(f)));
      changedTag.hidden = !flagChanged(f);
      touch();
    });
    out.setAttribute("data-changed", String(flagChanged(f)));
    rolloutWrap.appendChild(rolloutLab);
    rolloutWrap.appendChild(range);
    rolloutWrap.appendChild(out);
    controls.appendChild(rolloutWrap);

    row.appendChild(controls);
    return row;
  }

  function recomputeWarnings() {
    eachFlag(f => {
      const el = document.getElementById(`warn-${f.key}`);
      if (!el) return;
      const msgs = [];
      if (isEnabled(f)) {
        (f.requires || []).forEach(r => {
          const rf = findFlag(r);
          if (!rf) msgs.push(`requires ${r} (not defined)`);
          else if (!isEnabled(rf)) msgs.push(`requires ${r} (currently off)`);
        });
        (f.conflicts || []).forEach(c => {
          const cf = findFlag(c);
          if (cf && isEnabled(cf)) msgs.push(`conflicts with ${c} (currently on)`);
        });
      }
      if (msgs.length) {
        el.hidden = false;
        el.textContent = msgs.join(" · ");
      } else {
        el.hidden = true;
        el.textContent = "";
      }
    });
  }

  function touch() { plan.updated_at = new Date().toISOString(); }

  renderCycles();
  renderGroups();
  recomputeWarnings();

  // Findings
  const findingsRoot = document.getElementById("findings-root");
  (plan.findings || []).forEach(f => {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td"); td1.textContent = f.source || "";
    const td2 = document.createElement("td"); td2.textContent = f.note || "";
    tr.appendChild(td1); tr.appendChild(td2);
    findingsRoot.appendChild(tr);
  });

  // Decisions
  const decisionsRoot = document.getElementById("decisions-root");
  (plan.decisions || []).forEach(d => {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td"); td1.textContent = d.decision || "";
    const td2 = document.createElement("td"); td2.textContent = d.rationale || "";
    tr.appendChild(td1); tr.appendChild(td2);
    decisionsRoot.appendChild(tr);
  });

  // Progress
  const progressRoot = document.getElementById("progress-root");
  (plan.progress_log || []).forEach(p => {
    const tr = document.createElement("tr");
    ["ts", "phase", "action"].forEach(k => {
      const td = document.createElement("td");
      td.textContent = p[k] ?? "";
      tr.appendChild(td);
    });
    const filesTd = document.createElement("td");
    filesTd.textContent = (p.files || []).join(", ");
    tr.appendChild(filesTd);
    progressRoot.appendChild(tr);
  });

  // Tabs
  const tabBtns = Array.from(document.querySelectorAll('[role="tab"]'));
  const panels = Array.from(document.querySelectorAll('[role="tabpanel"]'));
  const selectTab = (idx) => {
    tabBtns.forEach((b, i) => {
      const sel = i === idx;
      b.setAttribute("aria-selected", String(sel));
      b.tabIndex = sel ? 0 : -1;
    });
    panels.forEach((p, i) => p.hidden = i !== idx);
  };
  tabBtns.forEach((b, i) => {
    b.addEventListener("click", () => selectTab(i));
    b.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") {
        e.preventDefault();
        const n = (i + 1) % tabBtns.length;
        tabBtns[n].focus(); selectTab(n);
      } else if (e.key === "ArrowLeft") {
        e.preventDefault();
        const n = (i - 1 + tabBtns.length) % tabBtns.length;
        tabBtns[n].focus(); selectTab(n);
      }
    });
  });

  // Diff output: KEY=value per toggle, KEY.rolled_out=N when only the percentage moved.
  function toDiff() {
    const lines = [];
    eachFlag(f => {
      const s = snapFlag(f.key); if (!s) return;
      if (f.value !== s.value) lines.push(`${f.key}=${typeof f.value === "boolean" ? (f.value ? "true" : "false") : String(f.value)}`);
      if ((f.rolled_out ?? 100) !== (s.rolled_out ?? 100)) lines.push(`${f.key}.rolled_out=${f.rolled_out ?? 100}`);
    });
    return lines.length === 0 ? "# no changes\n" : lines.join("\n") + "\n";
  }

  const copyText = async (text) => {
    try {
      if (navigator.clipboard) await navigator.clipboard.writeText(text);
      else {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed"; ta.style.left = "-9999px";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
      }
    } catch (e) { /* no-op */ }
  };

  document.getElementById("btn-copy-diff").addEventListener("click", () => copyText(toDiff()));
  document.getElementById("btn-copy-json").addEventListener("click", () => copyText(JSON.stringify(plan, null, 2)));
  document.getElementById("btn-print").addEventListener("click", () => window.print());
  document.getElementById("btn-save").addEventListener("click", savePlanHtml);

  function flashSaved(btn, msg) {
    const orig = btn.dataset.origLabel || btn.textContent;
    btn.dataset.origLabel = orig;
    btn.textContent = msg;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
  }

  async function savePlanHtml() {
    const btn = document.getElementById("btn-save");
    // Replace '<' with its \u escape on write-back to neutralize close-script
    // sequences a user typed into a plan string. JSON.parse round-trips the
    // escape back to '<' on reload, preserving semantics.
    dataEl.textContent = JSON.stringify(plan, null, 2).replace(/</g, "\\u003c");
    const html = "<!doctype html>\n" + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    if (window.showSaveFilePicker) {
      try {
        if (!window.__planFileHandle) {
          window.__planFileHandle = await window.showSaveFilePicker({
            suggestedName: "plan.html",
            types: [{ description: "plan-it HTML plan", accept: { "text/html": [".html"] } }],
          });
        }
        const writable = await window.__planFileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        flashSaved(btn, "Saved");
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return;
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "plan.html";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flashSaved(btn, "Downloaded");
  }
  document.getElementById("btn-reset").addEventListener("click", () => {
    // Restore in-place to keep snapshot/groups pointer identity (eachFlag uses groups).
    snapshot.forEach((sg, gi) => {
      (sg.flags || []).forEach((sf, fi) => {
        const f = groups[gi].flags[fi];
        f.value = sf.value;
        f.rolled_out = sf.rolled_out;
      });
    });
    touch();
    renderGroups();
    recomputeWarnings();
  });
})();
</script>
</body>
</html>
